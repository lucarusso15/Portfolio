<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  <link rel="icon" id="site-favicon" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header data-header></header>
  <div class="page-body" id="page-body"></div>
  <script src="config.js"></script>
  <script src="js/portfolio.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const page = PORTFOLIO_CONFIG.pages[0];
      document.title = PORTFOLIO_CONFIG.info.name;
      buildHeader(page.id);
      document.getElementById('page-body').innerHTML = buildPage(page);
    });
  </script>
</body>
</html>
