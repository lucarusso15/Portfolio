<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page</title>
  <link rel="icon" id="site-favicon" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header data-header></header>
  <div class="page-body" id="page-body"></div>
  <script src="config.js"></script>
  <script src="js/portfolio.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const PAGE_ID = 'page-2';
      const c = PORTFOLIO_CONFIG;
      const page = c.pages.find(p => p.id === PAGE_ID);
      if (!page) { document.getElementById('page-body').innerHTML = '<p style="padding:3rem;font-size:12px">Page not found.</p>'; return; }
      document.title = c.info.name;
      buildHeader(page.id);
      document.getElementById('page-body').innerHTML = buildPage(page);
    });
  </script>
</body>
</html>
