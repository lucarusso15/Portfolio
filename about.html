<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About</title>
  <link rel="icon" id="site-favicon" href="images/favicon.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header data-header></header>
  <div class="page-body">
    <div class="about-wrap">
      <div class="about-text" id="about-text"></div>
      <div>
        <img class="about-photo" src="images/portrait.jpg" alt=""
             onerror="this.style.display='none'">
      </div>
    </div>
    <div class="info-quote" id="info-quote"></div>
  </div>
  <script src="config.js"></script>
  <script src="js/portfolio.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const c      = PORTFOLIO_CONFIG;
      const about  = c.about;
      document.title = about.name;
      buildHeader('about');

      /* Random quote -- rendered with _renderContentBlocks() so style and bold work */
      const quotes = about.quotes && about.quotes.length ? about.quotes : [];
      if (quotes.length) {
        const q       = quotes[Math.floor(Math.random() * quotes.length)];
        const quoteEl = document.getElementById('info-quote');
        quoteEl.innerHTML = _renderContentBlocks([q]);
      }

      /* Bio -- rendered with _renderContentBlocks(), same as photo pages.
         padding* and margin* on the about object apply to the wrapper div,
         same convention as inline text boxes in photo pages. */
      const defaults = getDefaults();
      const padCSS   = _paddingStyle(about, defaults);
      const margCSS  = _marginStyle(about, defaults);
      const bioHTML  = _renderContentBlocks(about.content || []);

      /* Links */
      const emailHTML = about.email
        ? '<a href="mailto:' + about.email + '">' + about.email + '</a>'
        : '';
      const linksHTML = (about.links || [])
        .map(l => '<a href="' + l.link + '" target="_blank" rel="noopener">' + (l.displayLink || l.link) + '</a>')
        .join('');

      const wrapperStyle = [padCSS, margCSS].filter(Boolean).join(' ');

      document.getElementById('about-text').innerHTML =
        '<div class="text-box-inner" style="' + wrapperStyle + '">' + bioHTML + '</div>' +
        '<div class="about-links">' + emailHTML + linksHTML + '</div>';
    });
  </script>
</body>
</html>
